name: censys
version: "2.0.0"
description: "Censys internet search engine — host discovery, service fingerprinting, certificate transparency, attack surface mapping"
author: "cybersecua"
url: "https://github.com/cybersecua/cyberstrike-plugin-censys"

config:
  - name: CENSYS_API_ID
    description: "Censys API ID (from https://search.censys.io/account/api)"
    required: true
  - name: CENSYS_API_SECRET
    description: "Censys API Secret"
    required: true

requirements: "requirements.txt"
