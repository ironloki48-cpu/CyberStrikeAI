name: "censys_search"
command: "python3"
args: ["{{PLUGIN_DIR}}/scripts/censys_search.py"]
enabled: true
short_description: "Censys Platform API v3 - host/cert/web search, aggregation, threat hunting. Requires PAT token."
description: |
  Censys Platform API v3 - internet-wide host, certificate, and web property search.

  **IMPORTANT: Censys migrated to Platform API v3 in 2025.**
  - Old API ID/Secret NO LONGER WORKS
  - New auth: Personal Access Token (PAT) as Bearer token
  - New base URL: api.platform.censys.io/v3/
  - Generate PAT: https://accounts.censys.io/settings/personal-access-tokens
  - Configure in Settings → Plugins → Censys → CENSYS_PAT

  **Commands:**
  - `validate` - check token validity and credit balance (free)

  **Search (1 credit per query):**
  - resource_type=`host` (default) - search internet hosts
  - resource_type=`certificate` - search TLS certificates
  - resource_type=`aggregate` - aggregate results by field (set agg_field)

  **Free lookups (no credits):**
  - resource_type=`lookup` + query=IP - detailed host info
  - resource_type=`names` + query=IP - DNS names for an IP
  - resource_type=`cert` + query=SHA256 - certificate details
  - resource_type=`web` + query=hostname - web property info

  **Host search query examples:**
  - `port: 22` - all hosts with SSH
  - `port: 443 AND location.country: "Ukraine"` - HTTPS hosts in UA
  - `services.http.response.html_title: "Dashboard"` - web dashboards
  - `services.software.product: "OpenSSH" AND services.software.version: "7.*"` - outdated SSH
  - `ip: 1.2.3.0/24` - CIDR range
  - `autonomous_system.name: "HETZNER"` - hosts by ASN
  - `services.tls.certificate.names: "*.example.com"` - TLS cert names
  - `labels: "c2"` - known C2 infrastructure
  - `labels: "self-signed"` - self-signed certs
  - `services.http.response.status_code: 200 AND services.http.response.headers.server: "Apache*"` - Apache servers

  **Certificate search:**
  - `names: "*.example.com"` - certs by name
  - `issuer.organization: "Let's Encrypt"` - by issuer

  **Aggregation examples:**
  - query=`port: 443` resource_type=`aggregate` agg_field=`autonomous_system.name` - top ASNs
  - query=`services.software.product: "nginx"` resource_type=`aggregate` agg_field=`location.country` - nginx by country

  **Boolean operators:** AND, OR, NOT (must be uppercase)
  **Wildcards:** `*` at end of strings
  **CIDR:** `ip: 10.0.0.0/8`

  **Credits:** Free tier=100/month, Starter=10,000/month, Enterprise=unlimited
  Lookups are free. Searches cost 1 credit. Check balance: query=`validate`

  **Rate limits:** 1 concurrent request (Free/Starter), 10 (Enterprise). Returns HTTP 429 on excess.

parameters:
  - name: "query"
    type: "string"
    description: |
      Search query (Censys query language) or special command.
      Special: "validate" checks token and credits.
      For lookups: pass IP address, cert fingerprint, or hostname.
    required: true
    position: 0
    format: "positional"

  - name: "resource_type"
    type: "string"
    description: |
      Resource type (default "host"):
      - host - search internet hosts (1 credit)
      - certificate - search TLS certs (1 credit)
      - aggregate - aggregate by field (1 credit, set agg_field)
      - lookup - free host detail by IP
      - names - free DNS names for IP
      - cert - free cert detail by SHA256
      - web - free web property by hostname
    required: false
    position: 1
    format: "positional"
    default: "host"

  - name: "limit"
    type: "int"
    description: "Results per page (default 50, max 100)"
    required: false
    position: 2
    format: "positional"
    default: 50

  - name: "cursor"
    type: "string"
    description: "Pagination cursor from previous response"
    required: false

  - name: "agg_field"
    type: "string"
    description: "Field to aggregate by (for resource_type=aggregate). E.g. autonomous_system.name, location.country"
    required: false

  - name: "fields"
    type: "string"
    description: "Comma-separated fields to return (reduces response size)"
    required: false
