services:
  cyberstrikeai:
    container_name: cyberstrikeai
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "0.0.0.0:${DOCKER_HTTP_PORT:-18080}:8080"
      - "0.0.0.0:${DOCKER_MCP_PORT:-18081}:8081"
    environment:
      - CYBERSTRIKE_DOCKER=true
      - ALL_PROXY=${DOCKER_ALL_PROXY:-}
      - HTTP_PROXY=${DOCKER_HTTP_PROXY:-}
      - HTTPS_PROXY=${DOCKER_HTTPS_PROXY:-}
      - NO_PROXY=${DOCKER_NO_PROXY:-localhost,127.0.0.1,::1}
    volumes:
      - ./data:/app/data
      - ./tmp:/app/tmp
      - ./logs:/app/logs
    depends_on:
      flaresolverr:
        condition: service_started

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    ports:
      - "127.0.0.1:8191:8191"
    environment:
      - LOG_LEVEL=${FLARESOLVERR_LOG_LEVEL:-info}
      - LOG_HTML=${FLARESOLVERR_LOG_HTML:-false}
      - CAPTCHA_SOLVER=${FLARESOLVERR_CAPTCHA_SOLVER:-none}
      - TZ=${TZ:-UTC}
      # Proxy - FlareSolverr browser routes through this proxy for all requests.
      # Set to match CyberStrikeAI's proxy config for consistent IP/cookies:
      #   Tor:    FLARESOLVERR_PROXY_URL=socks5://host.docker.internal:9050
      #   SOCKS5: FLARESOLVERR_PROXY_URL=socks5://host.docker.internal:1080
      #   HTTP:   FLARESOLVERR_PROXY_URL=http://host.docker.internal:8080
      - PROXY_URL=${FLARESOLVERR_PROXY_URL:-}
    # Memory limit - Chromium can be hungry
    deploy:
      resources:
        limits:
          memory: 2G
