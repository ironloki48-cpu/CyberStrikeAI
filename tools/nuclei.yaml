name: "nuclei"
command: "nuclei"
enabled: true
short_description: "Fast vulnerability scanner using YAML templates for vulnerability detection"
description: |
  Nuclei is a template-based fast vulnerability scanner that uses community-maintained YAML templates for vulnerability detection.

  **Key Features:**
  - Fast vulnerability scanning
  - Template-based detection
  - Support for multiple protocols (HTTP, TCP, DNS, etc.)
  - Real-time result output
  - Support for custom templates

  **Use Cases:**
  - Vulnerability scanning and discovery
  - Security assessment
  - Penetration testing
  - Vulnerability verification

  **Bitrix Template Pack:**
  - If installed via CyberStrike installer script, Bitrix-focused templates are available at:
    `/opt/cyberstrike-tools/bitrix-nuclei-templates`
  - Run with `-t /opt/cyberstrike-tools/bitrix-nuclei-templates` to execute this pack.

  **Installed Template Sources (CyberStrike defaults):**
  - Official ProjectDiscovery templates:
    `/opt/cyberstrike-tools/nuclei-templates`
  - Bitrix community templates:
    `/opt/cyberstrike-tools/bitrix-nuclei-templates`
    (also linked as `/opt/cyberstrike-tools/nuclei-templates/custom/bitrix`)

  **Model Guidance:**
  - Start narrow: use `-tags`, `-s`, and `-pt` filters before full template sweeps.
  - Use official templates for broad baseline checks and CVE coverage.
  - Add Bitrix templates only when target technology is confirmed as Bitrix/Bitrix24.
  - Prefer workflows (`-w`) or `-as` for phased scans instead of unfiltered all-template runs.
parameters:
  - name: "target"
    type: "string"
    description: "Target URL or IP"
    required: true
    flag: "-u"
    format: "flag"
  - name: "severity"
    type: "string"
    description: "Severity filter (critical,high,medium,low,info)"
    required: false
    flag: "-s"
    format: "flag"
  - name: "tags"
    type: "string"
    description: "Tag filter (e.g. cve,rce,lfi)"
    required: false
    flag: "-tags"
    format: "flag"
  - name: "template"
    type: "string"
    description: "Custom template path"
    required: false
    flag: "-t"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: "Additional Nuclei parameters"
    required: false
    format: "positional"
